<svg viewBox="0 0 440 480" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="mascotTitle">
  <title id="mascotTitle">Illustration of a friendly robot law professor mascot: round face, big eyes, round glasses, a blue and gold graduation cap, a navy academic gown, holding a law book and a glowing digital pointer</title>

  <defs>
    <radialGradient id="headShine" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F3E9D4" />
    </radialGradient>
    <linearGradient id="gownGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B2C55" />
      <stop offset="100%" stop-color="#101B38" />
    </linearGradient>
  </defs>

  <!-- backdrop medallion -->
  <circle cx="220" cy="250" r="210" fill="#EEF0F3" />

  <!-- left sleeve (holds book) -->
  <path d="M150 300 C 108 312, 92 356, 100 404 L 150 404 C 146 366, 152 336, 176 312 Z" fill="url(#gownGrad)" />
  <circle cx="118" cy="404" r="22" fill="url(#headShine)" />

  <!-- right sleeve (holds pointer), raised -->
  <path d="M286 302 C 320 292, 344 262, 346 224 L 312 214 C 306 244, 292 266, 266 282 Z" fill="url(#gownGrad)" />
  <circle cx="330" cy="216" r="21" fill="url(#headShine)" />

  <!-- gown / shoulders / body -->
  <path d="M110 360 C 110 300, 155 268, 220 268 C 285 268, 330 300, 330 360 L 344 470 L 96 470 Z" fill="url(#gownGrad)" />
  <path d="M220 272 L 210 470 L 230 470 L 220 272 Z" fill="#0E1830" />
  <circle cx="220" cy="330" r="4" fill="#C9A227" />
  <circle cx="220" cy="370" r="4" fill="#C9A227" />
  <circle cx="220" cy="410" r="4" fill="#C9A227" />
  <path d="M172 276 C 186 298, 254 298, 268 276 L 256 264 C 244 280, 196 280, 184 264 Z" fill="#C9A227" />
  <!-- chest core emblem -->
  <circle cx="220" cy="352" r="12" fill="none" stroke="#C9A227" stroke-width="2.5" opacity="0.85" />
  <circle cx="220" cy="352" r="4" fill="#E3C875" opacity="0.9" />

  <!-- neck -->
  <rect x="200" y="230" width="40" height="46" rx="14" fill="url(#headShine)" />

  <!-- pointer, glowing tip -->
  <line x1="330" y1="216" x2="360" y2="152" stroke="#C9A227" stroke-width="6" stroke-linecap="round" />
  <circle cx="362" cy="148" r="10" fill="#E3C875" opacity="0.55" />
  <circle cx="362" cy="148" r="6" fill="#E3C875" />
  <circle cx="362" cy="148" r="2.6" fill="#FFFDF4" />

  <!-- book, held at left, with soft shadow -->
  <g>
    <rect x="86" y="378" width="128" height="92" rx="9" fill="#0F1830" opacity="0.10" transform="translate(3 5)" />
    <rect x="86" y="378" width="128" height="92" rx="9" fill="#FDFBF6" stroke="#C9A227" stroke-width="4" />
    <rect x="86" y="378" width="18" height="92" rx="6" fill="#162447" />
    <text x="160" y="420" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="700" fill="#162447" letter-spacing="1">LAW</text>
    <line x1="118" y1="436" x2="200" y2="436" stroke="#C9A227" stroke-width="2.5" opacity="0.8" />
    <line x1="118" y1="452" x2="188" y2="452" stroke="#C9A227" stroke-width="2.5" opacity="0.6" />
  </g>

  <!-- head -->
  <circle cx="220" cy="196" r="98" fill="url(#headShine)" stroke="#E3D6B4" stroke-width="2" />

  <!-- audio sensor nubs -->
  <circle cx="126" cy="196" r="13" fill="#FDFBF6" stroke="#C9A227" stroke-width="3" />
  <circle cx="314" cy="196" r="13" fill="#FDFBF6" stroke="#C9A227" stroke-width="3" />

  <!-- antenna, from top of cap -->
  <line x1="220" y1="56" x2="220" y2="20" stroke="#C9A227" stroke-width="4" stroke-linecap="round" />
  <circle cx="220" cy="15" r="7" fill="#C9A227" />

  <!-- glasses -->
  <circle cx="182" cy="200" r="34" fill="#FFFFFF" fill-opacity="0.5" stroke="#C9A227" stroke-width="5" />
  <circle cx="258" cy="200" r="34" fill="#FFFFFF" fill-opacity="0.5" stroke="#C9A227" stroke-width="5" />
  <line x1="216" y1="200" x2="224" y2="200" stroke="#C9A227" stroke-width="5" />

  <!-- eyes -->
  <circle cx="182" cy="202" r="15" fill="#162447" />
  <circle cx="258" cy="202" r="15" fill="#162447" />
  <circle cx="186" cy="197" r="4.5" fill="#FFFFFF" />
  <circle cx="262" cy="197" r="4.5" fill="#FFFFFF" />

  <!-- smile -->
  <path d="M196 246 C 208 258, 232 258, 244 246" stroke="#162447" stroke-width="6" stroke-linecap="round" fill="none" />

  <!-- mortarboard -->
  <g>
    <path d="M220 56 L 336 90 L 220 128 L 104 90 Z" fill="#24356B" />
    <ellipse cx="220" cy="92" rx="54" ry="16" fill="#1B2C55" />
    <circle cx="220" cy="92" r="8" fill="#C9A227" />
    <path d="M220 92 C 240 110, 240 136, 230 152" stroke="#C9A227" stroke-width="3.5" fill="none" stroke-linecap="round" />
    <circle cx="230" cy="154" r="6" fill="#C9A227" />
  </g>
</svg>
